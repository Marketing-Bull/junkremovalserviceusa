name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build first — Next.js generates .next/types (PageProps, LayoutProps, …)
      # that the standalone type check depends on.
      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck
